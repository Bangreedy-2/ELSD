<svg width="880" height="580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#0000000d"/>
    </filter>
  </defs>

  <rect width="880" height="580" fill="#f8fafc"/>
  <rect x="0" y="0" width="880" height="3" fill="#334155"/>

  <text x="440" y="33" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">GG Language Reference</text>
  <text x="440" y="51" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#94a3b8">syntax categories and built-in commands</text>
  <line x1="40" y1="62" x2="840" y2="62" stroke="#e2e8f0" stroke-width="1"/>

  <!-- MOTION card -->
  <rect x="20" y="72" width="200" height="228" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <rect x="20" y="72" width="200" height="3" rx="2" fill="#6366f1"/>
  <text x="36" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#0f172a">Motion</text>
  <line x1="36" y1="100" x2="204" y2="100" stroke="#f1f5f9" stroke-width="1"/>
  <text x="36" y="117" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Move to X10 Y20</text>
  <text x="36" y="133" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Move to Z5</text>
  <text x="36" y="149" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Move to X10 Y20 Z5</text>
  <text x="36" y="165" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Move to Origin</text>
  <text x="36" y="181" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Home</text>
  <text x="36" y="197" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Home X Y</text>
  <text x="36" y="213" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Home Z</text>
  <line x1="36" y1="224" x2="204" y2="224" stroke="#f1f5f9" stroke-width="1"/>
  <text x="36" y="240" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#6366f1">emits G0 / G1 / G28</text>
  <text x="36" y="256" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">triplet axis supported</text>
  <text x="36" y="272" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">layer tracking on Z moves</text>

  <!-- GEOMETRY card -->
  <rect x="232" y="72" width="200" height="228" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <rect x="232" y="72" width="200" height="3" rx="2" fill="#0284c7"/>
  <text x="248" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#0f172a">Geometry</text>
  <line x1="248" y1="100" x2="416" y2="100" stroke="#f1f5f9" stroke-width="1"/>
  <text x="248" y="117" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Add Square</text>
  <text x="248" y="131" font-family="'Consolas','Courier New',monospace" font-size="9" fill="#64748b">  Center X Y  Length L</text>
  <text x="248" y="149" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Add Rectangle</text>
  <text x="248" y="163" font-family="'Consolas','Courier New',monospace" font-size="9" fill="#64748b">  Center X Y  Width W  Length L</text>
  <text x="248" y="181" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Add Circle</text>
  <text x="248" y="195" font-family="'Consolas','Courier New',monospace" font-size="9" fill="#64748b">  Center X Y  Radius R</text>
  <text x="248" y="213" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Add Line From X1 Y1 To X2 Y2</text>
  <line x1="248" y1="224" x2="416" y2="224" stroke="#f1f5f9" stroke-width="1"/>
  <text x="248" y="240" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#0284c7">mode: segmented (polyline)</text>
  <text x="248" y="256" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#0284c7">mode: exact (G2/G3 arcs)</text>
  <text x="248" y="272" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">circle → 32 segments by default</text>

  <!-- MACHINE CONTROL card -->
  <rect x="444" y="72" width="200" height="228" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <rect x="444" y="72" width="200" height="3" rx="2" fill="#d97706"/>
  <text x="460" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#0f172a">Machine Control</text>
  <line x1="460" y1="100" x2="628" y2="100" stroke="#f1f5f9" stroke-width="1"/>
  <text x="460" y="117" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Temperature 210C</text>
  <text x="460" y="131" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#64748b">  emits M104 S210</text>
  <text x="460" y="149" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Wait for 5 seconds</text>
  <text x="460" y="163" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Wait for 2 minutes</text>
  <text x="460" y="177" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#64748b">  emits G4 S{n}</text>
  <text x="460" y="195" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Set speed to 3000</text>
  <text x="460" y="209" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#64748b">  emits G1 F3000</text>
  <text x="460" y="222" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Set layer_height to 0.2</text>
  <line x1="460" y1="233" x2="628" y2="233" stroke="#f1f5f9" stroke-width="1"/>
  <text x="460" y="249" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#d97706">adds layer comment annotations</text>
  <text x="460" y="265" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">tracked in gcode_generator.py</text>
  <text x="460" y="281" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">current_layer, current_z fields</text>

  <!-- CONTROL FLOW card -->
  <rect x="656" y="72" width="204" height="228" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <rect x="656" y="72" width="204" height="3" rx="2" fill="#16a34a"/>
  <text x="672" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#0f172a">Control Flow</text>
  <line x1="672" y1="100" x2="844" y2="100" stroke="#f1f5f9" stroke-width="1"/>
  <text x="672" y="117" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">If A &gt; B then { ... }</text>
  <text x="672" y="133" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">If A &gt; B then { ... }</text>
  <text x="672" y="147" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#64748b">  else { ... }</text>
  <text x="672" y="165" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Repeat 5 times { ... }</text>
  <text x="672" y="181" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">While cond { ... }</text>
  <text x="672" y="197" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Define pt as X Y</text>
  <text x="672" y="213" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#334155">Set name to expr</text>
  <line x1="672" y1="224" x2="844" y2="224" stroke="#f1f5f9" stroke-width="1"/>
  <text x="672" y="240" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">operators: + - * /</text>
  <text x="672" y="256" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">compare: == != &gt; &gt;= &lt; &lt;=</text>
  <text x="672" y="272" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#16a34a">symbol table + block scoping</text>

  <!-- BOTTOM: code example -->
  <rect x="20" y="316" width="840" height="244" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="36" y="337" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Compilation example</text>
  <line x1="36" y1="346" x2="844" y2="346" stroke="#f1f5f9" stroke-width="1"/>

  <!-- GG source panel -->
  <rect x="36" y="356" width="368" height="186" rx="5" fill="#0f172a"/>
  <text x="52" y="374" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#475569">// example_pyramid.gg</text>
  <text x="52" y="393" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc">Temperature</text>
  <text x="148" y="393" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a"> 210C</text>
  <text x="52" y="411" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc">Set</text>
  <text x="77" y="411" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#e2e8f0"> layer_height</text>
  <text x="183" y="411" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc"> to</text>
  <text x="202" y="411" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a"> 15</text>
  <text x="52" y="429" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc">Move to</text>
  <text x="108" y="429" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a"> X30 Y30 Z0</text>
  <text x="52" y="447" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc">Repeat</text>
  <text x="95" y="447" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a"> 4</text>
  <text x="108" y="447" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc"> times</text>
  <text x="151" y="447" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#e2e8f0"> {</text>
  <text x="66" y="465" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#7dd3fc">  Move to</text>
  <text x="132" y="465" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a"> X50 Y50 Z60</text>
  <text x="52" y="483" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#e2e8f0">}</text>
  <text x="36" y="530" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">.gg source</text>

  <!-- Arrow -->
  <text x="425" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" fill="#94a3b8">→</text>
  <text x="425" y="466" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#94a3b8">compile</text>

  <!-- G-code output panel -->
  <rect x="468" y="356" width="376" height="186" rx="5" fill="#0f172a"/>
  <text x="484" y="374" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#475569">; Generated G-code</text>
  <text x="484" y="393" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#86efac">M104 S210</text>
  <text x="560" y="393" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#475569">                ; temperature</text>
  <text x="484" y="411" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#475569">; layer height configured: 15 mm</text>
  <text x="484" y="429" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#86efac">G1 X30 Y30 Z0</text>
  <text x="484" y="447" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a">; === Layer 1 (Z=0.000mm) ===</text>
  <text x="484" y="465" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#475569">; REPEAT 4 times</text>
  <text x="484" y="483" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#86efac">G1 X50 Y50 Z60</text>
  <text x="484" y="501" font-family="'Consolas','Courier New',monospace" font-size="9.5" fill="#fde68a">; === Layer 5 (Z=60.000mm) ===</text>
  <text x="468" y="530" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#64748b">G-code output</text>
</svg>
